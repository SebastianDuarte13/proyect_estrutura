<div class="dashboard-container">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-circle">U</div>
    </div>
    <ul class="nav-links">
      <li class="active"><a href="javascript:void(0)" (click)="goToHome()"><span class="icon">🏠</span></a></li>
      <li><a href="javascript:void(0)"><span class="icon">📋</span></a></li>
      <li><a href="javascript:void(0)"><span class="icon">🎓</span></a></li>
      <li><a href="javascript:void(0)"><span class="icon">📅</span></a></li>
      <li><a href="javascript:void(0)" (click)="goToGestion()"><span class="icon">👥</span></a></li>
      <li><a href="javascript:void(0)"><span class="icon">📊</span></a></li>
      <li><a href="javascript:void(0)"><span class="icon">⚙️</span></a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <header class="top-header">
      <h1 class="page-title">Panel principal</h1>
      <div class="header-actions">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar...">
        </div>
        <div class="user-profile" (click)="goToAccount()">JP</div>
      </div>
    </header>

    <!-- Cards Grid -->
    <div class="cards-grid">
      <!-- Card 1 -->
      <div class="card">
        <div class="card-icon icon-blue">📋</div>
        <div class="card-info">
          <h3>Mis Notas</h3>
          <p>Semestre actual</p>
          <div class="value value-blue">4.2</div>
        </div>
      </div>
      
      <!-- Card 2 -->
      <div class="card">
        <div class="card-icon icon-orange">🎓</div>
        <div class="card-info">
          <h3>Cursos activos</h3>
          <p>Este semestre</p>
          <div class="value value-orange">6</div>
        </div>
      </div>
      
      <!-- Card 3 -->
      <div class="card">
        <div class="card-icon icon-green">📅</div>
        <div class="card-info">
          <h3>Asistencia</h3>
          <p>Promedio general</p>
          <div class="value value-green">92%</div>
        </div>
      </div>
      
      <!-- Card 4 -->
      <div class="card">
        <div class="card-icon icon-purple">🕒</div>
        <div class="card-info">
          <h3>Horarios</h3>
          <p>Ver mi horario</p>
        </div>
      </div>
      
      <!-- Card 5 -->
      <div class="card" (click)="goToCreateUser()">
        <div class="card-icon icon-teal">👥</div>
        <div class="card-info">
          <h3>Usuarios</h3>
          <p>Gestionar</p>
        </div>
      </div>
      
      <!-- Card 6 -->
      <div class="card">
        <div class="card-icon icon-red">📊</div>
        <div class="card-info">
          <h3>Reportes</h3>
          <p>Estadísticas</p>
        </div>
      </div>
    </div>
  </div>
</div>
